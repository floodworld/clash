[custom]
; --- 规则集设置 (按优先级从高到低排列) ---
; 1. 私有与特殊分流 (你的私有 Emby 置顶，确保秒开)
ruleset=📹 EMBY服,https://raw.githubusercontent.com/floodworld/clash/main/MyEmby.list

; 2. 广告拦截 (在处理业务前先过滤垃圾流量)
