# --- 3. 规则集 (统一使用 MRS 格式对齐博主模板，保证加载成功率) ---
rule-providers:
  LAN:
    type: http
    behavior: domain
    format: mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"
    path: ./rules/lan.mrs
  UnBan:
    type: http
    behavior: domain
    format: mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/unban.mrs"
    path: ./rules/unban.mrs
  MyEmby:
    type: http
    behavior: classical
    format: text
    url: "https://raw.githubusercontent.com/floodworld/clash/main/MyEmby.list"
    path: ./rules/emby.list
  BanAD:
    type: http
    behavior: domain
    format: mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ads-all.mrs"
    path: ./rules/ads.mrs
  Gemini:
    type: http
    behavior: domain
    format: mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google-gemini.mrs"
    path: ./rules/gemini.mrs
    interval: 0
  OpenAI:
    type: http
