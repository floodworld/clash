    interval: 0
    url: https://yfamilys.com/rule/YouTubeMusic.list
# --- 4. 路由规则 (严格按照你之前的分层逻辑) ---
rules:
  - RULE-SET,MyDirect,我的直连
  - RULE-SET,LAN,全球直连
  - RULE-SET,UnBan,全球直连
  - RULE-SET,MyEmby,EMBY服
  - RULE-SET,BanAD,广告拦截
  # 业务组核心分流
  - RULE-SET,YTMusic,YTMusic
  - RULE-SET,Gemini,Gemini
  - RULE-SET,OpenAI,Openai
  - RULE-SET,Manus,Manus
  - RULE-SET,YouTube,油管视频
  - RULE-SET,Netflix,奈飞视频
  - RULE-SET,Telegram,电报消息
  - RULE-SET,GitHub,GitHub
  - RULE-SET,ProxyGFW,节点选择
  - RULE-SET,ChinaDomain,全球直连
  - RULE-SET,ChinaIP,全球直连
  - MATCH,漏网之鱼
