# --- 全局基础配置 (对齐博主模板) ---
allow-lan: true
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true
global-client-fingerprint: chrome
sniffer:
  enable: true
  sniff:
    TLS: {ports: [443, 8443]}
    HTTP: {ports: [80, 8080-8880], override-destination: true}
    QUIC: {ports: [443, 8443]}
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  default-nameserver: [119.29.29.29, 223.5.5.5]
  nameserver: ['https://dns.alidns.com/dns-query', 'https://doh.pub/dns-query']
  proxy-server-nameserver: ['https://dns.alidns.com/dns-query']
# --- 1. 订阅源 ---
proxy-providers:
  KTM:
    type: http
    url: "https://ktm.qiongr.cn/api/v1/client/subscribe?token=6a15900cd581a8c3edbc1102df3eed9a"
    interval: 3600
    path: ./proxies/ktm.yaml
    health-check: {enable: true, interval: 600, url: 'https://www.google.com/generate_204'}
    proxy: DIRECT
  LiangXin:
    type: http
    url: "https://liangxin.xyz/api/v1/liangxin?OwO=d7b42543c1ba5267eb6741bb24087c6c"
    interval: 3600
    path: ./proxies/liangxin.yaml
    health-check: {enable: true, interval: 600, url: 'https://www.google.com/generate_204'}
    proxy: DIRECT
    benchmark-url: https://www.google.com/generate_204
  CF Page2:
    interval: 3600
    url: 'https://url.v1.mk/sub?target=clash&url=https%3A%2F%2Fpage2.2010520.xyz%2Fe690afa0-2043-4af7-8878-26640714a6cf%2Fsub&insert=false&config=https%3A%2F%2Fraw.githubusercontent.com%2FbyJoey%2Ftest%2Frefs%2Fheads%2Fmain%2Ftist.ini&emoji=true&list=false&xudp=false&udp=false&tfo=false&expand=true&scv=false&fdn=false&new_name=true '
    benchmark-url: https://www.google.com/generate_204
    benchmark-timeout: 300
# --- 2. 策略组 (全量复刻你的 Stash 逻辑，不删减任何业务组) ---
proxy-groups:
  - name: 我的直连
    proxies:
      - DIRECT
      - REJECT
      - REJECT-DROP
    type: url-test
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Direct.png
  # 基础池
  - name: 节点选择
    type: select
    proxies: [自动选择, EMBY专线, KTM香港, 香港节点, 台湾节点, 狮城节点, 日本节点, 美国节点, 韩国节点, 手动切换, 香港自选, 美国自选, 狮城自选, 台湾自选, 日本自选, 韩国自选, DIRECT]
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png
  - name: 自动选择
    type: url-test
    use: [KTM, LiangXin, CF Page2]
    url: https://www.google.com/generate_204
    interval: 300
    tolerance: 150
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png
  - name: 手动切换
    type: select
    use: [KTM, LiangXin, CF Page2]
    icon: https://github.com/shindgewongxj/WHATSINStash/raw/main/icon/select.png
  - name: EMBY专线
    type: select
    use: [LiangXin]
    filter: "(新加坡高速|台湾高速|英国伦敦)"
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Emby.png
  - name: KTM香港
    type: fallback
    use: [KTM]
    filter: "(HK香港-0)"
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/HK.png
  # 地区测速与自选组
  - {name: 香港节点, type: fallback, use: [KTM, LiangXin], filter: "(港|HK|hk|Hong Kong)", url: "https://www.google.com/generate_204", icon: 'https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/flag/HK_04.png'}
  - {name: 台湾节点, type: fallback, use: [KTM, LiangXin], filter: "(台|新北|彰化|TW|Taiwan)", url: "https://www.google.com/generate_204", icon: 'https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/flag/TW_01.png'}
  - {name: 狮城节点, type: fallback, use: [KTM, LiangXin], filter: "(新加坡|坡|SG|Singapore)", url: "https://www.google.com/generate_204", icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png'}
  - {name: 日本节点, type: fallback, use: [KTM, LiangXin], filter: "(日本|东京|大阪|JP|Japan)", url: "https://www.google.com/generate_204", icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/JP.png'}
  - {name: 美国节点, type: fallback, use: [KTM, LiangXin], filter: "(美|US|United States)", url: "https://www.google.com/generate_204", icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png'}
  - {name: 韩国节点, type: fallback, use: [KTM, LiangXin], filter: "(KR|Korea|KOR|首尔|韩)", url: "https://www.google.com/generate_204", icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Korea.png'}
  - {name: 香港自选, type: select, use: [KTM, LiangXin], filter: "(港|HK|hk|Hong Kong)", icon: 'https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/flag/HK_03.png'}
  - {name: 美国自选, type: select, use: [KTM, LiangXin], filter: "(美|US|United States)", icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png'}
  - {name: 狮城自选, type: fallback, use: [LiangXin], filter: "(新加坡|坡|SG|Singapore)", icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png'}
  - {name: 台湾自选, type: select, use: [KTM, LiangXin], filter: "(台|新北|彰化|TW|Taiwan)", icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Taiwan.png'}
  - {name: 日本自选, type: select, use: [KTM, LiangXin], filter: "(日本|东京|大阪|JP|Japan)", icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png'}
  - {name: 韩国自选, type: select, use: [KTM, LiangXin], filter: "(KR|Korea|KOR|首尔|韩)", icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Korea.png'}
  - icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/YouTube_Music.png
    name: YTMusic
    type: select
    use:
      - CF Page2
    include-all: null
    filter: 'null'
    proxies:
      - 香港自选
      - 美国自选
      - 狮城自选
      - 台湾自选
      - 日本自选
      - 韩国自选
      - 手动切换
