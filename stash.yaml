# ---------------------------------------------------------------
# Stash 配置文件 - 2026 最终修正版 (KTM 链接更新 & 测速地址统一)
# ---------------------------------------------------------------

# 1. 代理集合
proxy-providers:
  KTM:
    type: http
    # 已更新为新的订阅链接
    url: "https://ktm.qiongr.cn/api/v1/client/subscribe?token=6a15900cd581a8c3edbc1102df3eed9a"
    interval: 3600
    path: ./proxies/ktm.yaml
    health-check:
      enable: true
      interval: 600
      url: https://www.google.com/generate_204

  LiangXin:
    type: http
    url: "https://liangxin.xyz/api/v1/liangxin?OwO=d7b42543c1ba5267eb6741bb24087c6c"
    interval: 3600
    path: ./proxies/liangxin.yaml
    health-check:
      enable: true
      interval: 600
      url: https://www.google.com/generate_204

# 2. 策略组
proxy-groups:
  # --- 基础筛选池 ---
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 自动选择
      - 🎥 EMBY专线
      - 🇭🇰 KTM香港
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇸🇬 狮城节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🚀 手动切换
      - DIRECT

  - name: ♻️ 自动选择
    type: url-test
    use: [KTM, LiangXin]
    url: https://www.google.com/generate_204
    interval: 300
    tolerance: 150

  - name: 🚀 手动切换
    type: select
    use: [KTM, LiangXin]

  - name: 🎥 EMBY专线
    type: select
    use: [KTM, LiangXin]
    filter: "(香港专线|新加坡专线|高速|IPLC|0.1x)"

  - name: 🇭🇰 KTM香港
    type: select
    use: [KTM]
    filter: "(HK香港-0)"

  # --- 地区自动测速选路 (全部统一使用 google.com/generate_204) ---
  - name: 🇭🇰 香港节点
    type: url-test
    use: [KTM, LiangXin]
    filter: "(港|HK|hk|Hong Kong)"
    url: https://www.google.com/generate_204
  
  - name: 🇨🇳 台湾节点
    type: url-test
    use: [KTM, LiangXin]
    filter: "(台|新北|彰化|TW|Taiwan)"
    url: https://www.google.com/generate_204

  - name: 🇸🇬 狮城节点
    type: url-test
    use: [KTM, LiangXin]
    filter: "(新加坡|坡|SG|Singapore)"
    url: https://www.google.com/generate_204

  - name: 🇯🇵 日本节点
    type: url-test
    use: [KTM, LiangXin]
    filter: "(日本|东京|大阪|JP|Japan)"
    url: https://www.google.com/generate_204

  - name: 🇺🇲 美国节点
    type: url-test
    use: [KTM, LiangXin]
    filter: "(美|US|United States)"
    url: https://www.google.com/generate_204

  # --- 地区手动自选 ---
  - name: 🇭🇰 香港自选
    type: select
    use: [KTM, LiangXin]
    filter: "(港|HK|hk|Hong Kong)"

  - name: 🇺🇲 美国自选
    type: select
    use: [KTM, LiangXin]
    filter: "(美|US|United States)"

  - name: 🇸🇬 狮城自选
    type: select
    use: [KTM, LiangXin]
    filter: "(新加坡|坡|SG|Singapore)"

  - name: 🇨🇳 台湾自选
    type: select
    use: [KTM, LiangXin]
    filter: "(台|新北|彰化|TW|Taiwan)"

  # --- 业务功能策略组 ---
  - name: 💬 Gemini
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择, 🇺🇲 美国自选, 🇸🇬 狮城自选, 🇨🇳 台湾自选, 🇭🇰 KTM香港, 🇭🇰 香港节点, 🇨🇳 台湾节点, 🇸🇬 狮城节点, 🇯🇵 日本节点, 🇺🇲 美国节点, 🚀 手动切换, DIRECT]

  - name: 💬 Openai
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择, 🇺🇲 美国自选, 🇸🇬 狮城自选, 🇨🇳 台湾自选, 🇭🇰 KTM香港, 🇭🇰 香港节点, 🇨🇳 台湾节点, 🇸🇬 狮城节点, 🇯🇵 日本节点, 🇺🇲 美国节点, 🚀 手动切换, DIRECT]

  - name: 💬 Claude
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择, 🇺🇲 美国自选, 🇸🇬 狮城自选, 🇨🇳 台湾自选, 🇭🇰 KTM香港, 🇭🇰 香港节点, 🇨🇳 台湾节点, 🇸🇬 狮城节点, 🇯🇵 日本节点, 🇺🇲 美国节点, 🚀 手动切换, DIRECT]

