# ---------------------------------------------------------------
# Nikki (Mihomo) 配置文件 - 2026 逻辑全开复刻版
# ---------------------------------------------------------------

allow-lan: true
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver: [223.5.5.5, 119.29.29.29]
  nameserver: [https://dns.alidns.com/dns-query, https://doh.pub/dns-query]
  fallback: [https://1.1.1.1/dns-query, https://8.8.8.8/dns-query]
  proxy-server-nameserver: [223.5.5.5]

# --- 1. 代理集合 ---
proxy-providers:
  KTM:
    type: http
    url: "https://ktm.qiongr.cn/api/v1/client/subscribe?token=6a15900cd581a8c3edbc1102df3eed9a"
    interval: 3600
    path: ./proxies/ktm.yaml
    health-check: {enable: true, interval: 600, url: https://www.google.com/generate_204}

  LiangXin:
    type: http
    url: "https://liangxin.xyz/api/v1/liangxin?OwO=d7b42543c1ba5267eb6741bb24087c6c"
    interval: 3600
    path: ./proxies/liangxin.yaml
    health-check: {enable: true, interval: 600, url: https://www.google.com/generate_204}

# --- 2. 策略组 (已补全节点选择 & 漏网之鱼) ---
proxy-groups:
  - name: 🚀 节点选择
    type: select
    # 此处已补全：加入所有地域自选节点
    proxies: [♻️ 自动选择, 🎥 EMBY专线, 🇭🇰 KTM香港, 🇭🇰 香港节点, 🇨🇳 台湾节点, 🇸🇬 狮城节点, 🇯🇵 日本节点, 🇺🇲 美国节点, 🇰🇷 韩国节点, 🚀 手动切换, 🇭🇰 香港自选, 🇺🇲 美国自选, 🇸🇬 狮城自选, 🇨🇳 台湾自选, 🇯🇵 日本自选, 🇰🇷 韩国自选, DIRECT]

  - name: ♻️ 自动选择
    type: url-test
    use: [KTM, LiangXin]
    url: https://www.google.com/generate_204
    interval: 300
    tolerance: 150

  - name: 🚀 手动切换
    type: select
    use: [KTM, LiangXin]

  - name: 🎥 EMBY专线
    type: select
    use: [KTM, LiangXin]
    filter: "(香港专线|新加坡专线|高速|IPLC|0.1x)"

  - name: 🇭🇰 KTM香港
    type: select
    use: [KTM]
    filter: "(HK香港-0)"

  - { name: 🇭🇰 香港节点, type: url-test, use: [KTM, LiangXin], filter: "(港|HK|hk|Hong Kong)", url: "https://www.google.com/generate_204" }
  - { name: 🇨🇳 台湾节点, type: url-test, use: [KTM, LiangXin], filter: "(台|新北|彰化|TW|Taiwan)", url: "https://www.google.com/generate_204" }
  - { name: 🇸🇬 狮城节点, type: url-test, use: [KTM, LiangXin], filter: "(新加坡|坡|SG|Singapore)", url: "https://www.google.com/generate_204" }
  - { name: 🇯🇵 日本节点, type: url-test, use: [KTM, LiangXin], filter: "(日本|东京|大阪|JP|Japan)", url: "https://www.google.com/generate_204" }
  - { name: 🇺🇲 美国节点, type: url-test, use: [KTM, LiangXin], filter: "(美|US|United States)", url: "https://www.google.com/generate_204" }
  - { name: 🇰🇷 韩国节点, type: url-test, use: [KTM, LiangXin], filter: "(KR|Korea|KOR|首尔|韩)", url: "https://www.google.com/generate_204" }
  
  - { name: 🇭🇰 香港自选, type: select, use: [KTM, LiangXin], filter: "(港|HK|hk|Hong Kong)" }
  - { name: 🇺🇲 美国自选, type: select, use: [KTM, LiangXin], filter: "(美|US|United States)" }
