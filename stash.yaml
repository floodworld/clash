  ChinaIP:
    type: http
    behavior: ipcidr
    format: mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs"
    path: ./rules/china_ip.mrs
  MyDirect:
    behavior: classical
    format: text
    interval: 3600
    url: https://raw.githubusercontent.com/floodworld/clash/refs/heads/main/MyDirect.list
  YTMusic:
    behavior: classical
