# --- 4. 路由规则 (修正后的顺序：精细业务 > 通用服务 > 通用代理) ---
rules:
  # [1] 基础规则 (直连、广告、内部服务)
  - RULE-SET,LAN,🎯 全球直连
  - RULE-SET,UnBan,🎯 全球直连
  - RULE-SET,MyEmby,📹 EMBY服
  - RULE-SET,BanAD,🛑 广告拦截

  # [2] 精细业务优先级 (必须放在 GoogleFCM 和 ProxyGFW 之前)
  # 确保 Gemini、OpenAI、YouTube 等请求不会被截胡
  - RULE-SET,Gemini,💬 Gemini
  - RULE-SET,OpenAI,💬 Openai
  - RULE-SET,Manus,💬 Manus
  - RULE-SET,YouTube,📹 油管视频
  - RULE-SET,Netflix,🎥 奈飞视频
  - RULE-SET,Telegram,📲 电报消息
  - RULE-SET,GitHub,👨🏿‍💻 GitHub

  # [3] 通用服务与兜底代理
  - RULE-SET,GoogleFCM,📢 谷歌FCM
  - RULE-SET,ProxyGFW,🚀 节点选择

  # [4] 国内直连与最终兜底
  - RULE-SET,ChinaDomain,🎯 全球直连
  - GEOIP,CN,🎯 全球直连
  - MATCH,🐟 漏网之鱼
