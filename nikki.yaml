# ---------------------------------------------------------------
# Nikki (Mihomo) 配置文件 - 1:1 完美复刻版
# ---------------------------------------------------------------

# --- 基础全局配置 ---
allow-lan: true
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true

# DNS 模块 (针对软路由优化的 Fake-IP 模式)
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query

# --- 1. 代理集合 (KTM & LiangXin) ---
proxy-providers:
  KTM:
    type: http
    url: "https://ktm.qiongr.cn/api/v1/client/subscribe?token=6a15900cd581a8c3edbc1102df3eed9a"
    interval: 3600
    path: ./proxies/ktm.yaml
    health-check:
      enable: true
      interval: 600
      url: https://www.google.com/generate_204

  LiangXin:
    type: http
    url: "https://liangxin.xyz/api/v1/liangxin?OwO=d7b42543c1ba5267eb6741bb24087c6c"
    interval: 3600
    path: ./proxies/liangxin.yaml
    health-check:
      enable: true
      interval: 600
      url: https://www.google.com/generate_204

# --- 2. 策略组 (全量保留你的 Stash 逻辑) ---
proxy-groups:
  # 基础池
  - name: 🚀 节点选择
    type: select
    proxies: [♻️ 自动选择, 🎥 EMBY专线, 🇭🇰 KTM香港, 🇭🇰 香港节点, 🇨🇳 台湾节点, 🇸🇬 狮城节点, 🇯🇵 日本节点, 🇺🇲 美国节点, 🚀 手动切换, DIRECT]

  - name: ♻️ 自动选择
    type: url-test
    use: [KTM, LiangXin]
    url: https://www.google.com/generate_204
    interval: 300
    tolerance: 150

  - name: 🚀 手动切换
    type: select
    use: [KTM, LiangXin]

  - name: 🎥 EMBY专线
    type: select
    use: [KTM, LiangXin]
    filter: "(香港专线|新加坡专线|高速|IPLC|0.1x)"

  - name: 🇭🇰 KTM香港
    type: select
    use: [KTM]
    filter: "(HK香港-0)"

  # 地区测速 & 自选组
  - { name: 🇭🇰 香港节点, type: url-test, use: [KTM, LiangXin], filter: "(港|HK|hk|Hong Kong)", url: "https://www.google.com/generate_204" }
  - { name: 🇨🇳 台湾节点, type: url-test, use: [KTM, LiangXin], filter: "(台|新北|彰化|TW|Taiwan)", url: "https://www.google.com/generate_204" }
  - { name: 🇸🇬 狮城节点, type: url-test, use: [KTM, LiangXin], filter: "(新加坡|坡|SG|Singapore)", url: "https://www.google.com/generate_204" }
  - { name: 🇯🇵 日本节点, type: url-test, use: [KTM, LiangXin], filter: "(日本|东京|大阪|JP|Japan)", url: "https://www.google.com/generate_204" }
  - { name: 🇺🇲 美国节点, type: url-test, use: [KTM, LiangXin], filter: "(美|US|United States)", url: "https://www.google.com/generate_204" }
  
