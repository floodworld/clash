# --- 3. 规则集 (统一使用 MRS 格式对齐博主模板，保证加载成功率) ---
rule-providers:
  LAN:
    type: http
    behavior: domain
    format: mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"
    path: ./rules/lan.mrs
  UnBan:
    type: http
    behavior: domain
    format: mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/unban.mrs"
    path: ./rules/unban.mrs
  MyEmby:
    type: http
    behavior: classical
    format: text
    url: "https://raw.githubusercontent.com/floodworld/clash/main/MyEmby.list"
    path: ./rules/emby.list
  BanAD:
    type: http
    behavior: domain
    format: mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ads-all.mrs"
    path: ./rules/ads.mrs
  Gemini:
    type: http
    behavior: domain
    format: mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google-gemini.mrs"
    path: ./rules/gemini.mrs
  OpenAI:
    type: http
    behavior: domain
    format: mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/openai.mrs"
    path: ./rules/openai.mrs
  Manus:
    type: http
    behavior: domain
    format: mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/manus.mrs"
    path: ./rules/manus.mrs
  YouTube:
    type: http
    behavior: domain
    format: mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/youtube.mrs"
    path: ./rules/youtube.mrs
  Netflix:
    type: http
    behavior: domain
    format: mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/netflix.mrs"
    path: ./rules/netflix.mrs
  Telegram:
    type: http
    behavior: domain
    format: mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/telegram.mrs"
    path: ./rules/telegram.mrs
  GitHub:
    type: http
    behavior: domain
    format: mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/github.mrs"
    path: ./rules/github.mrs
  ProxyGFW:
    type: http
    behavior: domain
    format: mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/geolocation-!cn.mrs"
    path: ./rules/gfw.mrs
  ChinaDomain:
    type: http
    behavior: domain
    format: mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs"
    path: ./rules/china.mrs
  ChinaIP:
    type: http
    behavior: ipcidr
    format: mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs"
    path: ./rules/china_ip.mrs

# --- 4. 路由规则 (严格按照你之前的分层逻辑) ---
rules:
  - RULE-SET,LAN,🎯 全球直连
  - RULE-SET,UnBan,🎯 全球直连
  - RULE-SET,MyEmby,📹 EMBY服
  - RULE-SET,BanAD,🛑 广告拦截

  # 业务组核心分流
  - RULE-SET,Gemini,💬 Gemini
  - RULE-SET,OpenAI,💬 Openai
  - RULE-SET,Manus,💬 Manus
  - RULE-SET,YouTube,📹 油管视频
  - RULE-SET,Netflix,🎥 奈飞视频
  - RULE-SET,Telegram,📲 电报消息
  - RULE-SET,GitHub,👨🏿‍💻 GitHub

  # 基础分流
  - RULE-SET,ProxyGFW,🚀 节点选择
  - RULE-SET,ChinaDomain,🎯 全球直连
  - RULE-SET,ChinaIP,🎯 全球直连
  - MATCH,🐟 漏网之鱼
