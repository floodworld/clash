[custom]
;不要随意改变关键字，否则会导致出错
;优化逻辑：私有规则优先 -> 广告拦截 -> AI平台 -> 视频媒体 -> 基础服务 -> 国内直连 -> 漏网之鱼

; --- 1. 私有与特殊分流 (优先级最高) ---
ruleset=📹 EMBY服,https://raw.githubusercontent.com/floodworld/clash/main/MyEmby.list
ruleset=📹 EMBY服,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Emby/Emby.list

; --- 2. 广告拦截与应用净化 ---
; 注意：这里拦截了常见的广告库，建议在手机端继续配合 Stash 覆写以达到完美去广告
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=🆎 AdBlock,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanEasyList.list
ruleset=🆎 AdBlock,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanEasyListChina.list
ruleset=🍃 应用净化,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list
ruleset=🛡️ 隐私防护,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanEasyPrivacy.list

; --- 3. AI 平台 (精准定向) ---
ruleset=💬 Gemini,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Gemini/Gemini.list
ruleset=💬 Openai,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/OpenAI/OpenAI.list
ruleset=💬 Claude,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Claude/Claude.list
ruleset=💬 Ai平台,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/AI.list

; --- 4. 视频与高频海外服务 ---
ruleset=📹 油管视频,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list
ruleset=🎥 奈飞视频,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Netflix.list
ruleset=🍀 Google,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.list
ruleset=📢 谷歌FCM,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/GoogleFCM.list
ruleset=📲 电报消息,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list
ruleset=👨🏿‍💻 GitHub,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.list

; --- 5. 微软与苹果服务 (建议直连优先，必要时代理) ---
ruleset=Ⓜ️ 微软Bing,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Bing.list
ruleset=Ⓜ️ 微软云盘,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/OneDrive.list
ruleset=Ⓜ️ 微软服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Microsoft.list
ruleset=🍎 苹果服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list

; --- 6. 媒体与全球分流 ---
ruleset=🌏 国内媒体,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaMedia.list
ruleset=🌍 国外媒体,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GlobalMedia/GlobalMedia.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list

; --- 7. 国内直连 (放在最后进行兜底直连) ---
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GoogleCN.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/SteamCN.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Download.list
ruleset=🎯 全球直连,[]GEOIP,CN
ruleset=🐟 漏网之鱼,[]FINAL

; --- 策略组设置 ---
; 增加容差值 150ms，减少不必要的断线切换
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🎥 EMBY专线`[]🇭🇰 KTM香港`[]🇭🇰 香港节点`[]🇨🇳 台湾节点`[]🇸🇬 狮城节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇰🇷 韩国节点`[]🚀 手动切换`[]DIRECT
custom_proxy_group=🚀 手动切换`select`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,150
custom_proxy_group=🎥 EMBY专线`select`(香港专线|新加坡专线|高速|IPLC|0.1x)

; AI 相关组，默认优先使用 KTM 或 自动选择
custom_proxy_group=💬 Gemini`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 KTM香港`[]🇸🇬 狮城节点`[]🇺🇲 美国节点`[]DIRECT
custom_proxy_group=💬 Openai`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 KTM香港`[]🇸🇬 狮城节点`[]🇺🇲 美国节点`[]DIRECT
custom_proxy_group=💬 Claude`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 KTM香港`[]🇸🇬 狮城节点`[]🇺🇲 美国节点`[]DIRECT
custom_proxy_group=💬 Ai平台`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 KTM香港`[]🇸🇬 狮城节点`[]DIRECT

; 视频媒体组
custom_proxy_group=📹 油管视频`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 KTM香港`[]🇸🇬 狮城节点`[]🇺🇲 美国节点`[]DIRECT
custom_proxy_group=📹 EMBY服`select`[]🎥 EMBY专线`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 KTM香港`[]DIRECT

; 广告与浄化 (默认 REJECT，误伤时可手动切 DIRECT)
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🍃 应用净化`select`[]REJECT`[]DIRECT
custom_proxy_group=🆎 AdBlock`select`[]REJECT`[]DIRECT
custom_proxy_group=🛡️ 隐私防护`select`[]REJECT`[]DIRECT

; 自动筛选地域组
custom_proxy_group=🇭🇰 香港节点`url-test`(港|HK|hk|Hong Kong)`http://www.gstatic.com/generate_204`300,,100
custom_proxy_group=🇯🇵 日本节点`url-test`(日本|东京|大阪|JP|Japan)`http://www.gstatic.com/generate_204`300,,100
custom_proxy_group=🇺🇲 美国节点`url-test`(美|US|United States)`http://www.gstatic.com/generate_204`300,,150
custom_proxy_group=🇸🇬 狮城节点`url-test`(新加坡|坡|SG|Singapore)`http://www.gstatic.com/generate_204`300,,100

enable_rule_generator=true
overwrite_original_rules=true
